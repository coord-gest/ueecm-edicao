name: Deploy Cloudflare Worker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verifica se todas as secrets necessárias estão definidas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DISPATCH_SECRET: ${{ secrets.DISPATCH_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_VAPID_PUBLIC_KEY: ${{ secrets.FIREBASE_VAPID_PUBLIC_KEY }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          set -e
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            VITE_SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_KEY
            GEMINI_API_KEY
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
            VAPID_SUBJECT
            DISPATCH_SECRET
            FIREBASE_PROJECT_ID
            FIREBASE_CLIENT_EMAIL
            FIREBASE_PRIVATE_KEY
            FIREBASE_VAPID_PUBLIC_KEY
            FIREBASE_WEB_API_KEY
          )
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Secrets ausentes no GitHub Actions: ${missing[*]}"
            echo "Configure em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Todas as secrets obrigatórias estão configuradas."

  ci-gate:
    needs: validate-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test

  e2e:
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E (login, comunicado, justificativa, fcm-dispatch)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISPATCH_SECRET: ${{ secrets.DISPATCH_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_RESP_EMAIL: ${{ secrets.E2E_RESP_EMAIL }}
          E2E_RESP_PASSWORD: ${{ secrets.E2E_RESP_PASSWORD }}
          E2E_RESP_ALUNO_ID: ${{ secrets.E2E_RESP_ALUNO_ID }}
        run: bun run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    needs: [validate-secrets, ci-gate, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # Uploads runtime secrets to the Worker before deploy.
          # Each name listed here must exist in GitHub Actions Secrets.
          secrets: |
            GEMINI_API_KEY
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
            VAPID_SUBJECT
            DISPATCH_SECRET
            SENTRY_DSN
            FIREBASE_PROJECT_ID
            FIREBASE_CLIENT_EMAIL
            FIREBASE_PRIVATE_KEY
            FIREBASE_VAPID_PUBLIC_KEY
            FIREBASE_WEB_API_KEY
            GOOGLE_DRIVE_CLIENT_EMAIL
            GOOGLE_DRIVE_PRIVATE_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DISPATCH_SECRET: ${{ secrets.DISPATCH_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_VAPID_PUBLIC_KEY: ${{ secrets.FIREBASE_VAPID_PUBLIC_KEY }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          GOOGLE_DRIVE_CLIENT_EMAIL: ${{ secrets.GOOGLE_DRIVE_CLIENT_EMAIL }}
          GOOGLE_DRIVE_PRIVATE_KEY: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY }}
