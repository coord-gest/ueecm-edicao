# D4 (hardening): varredura automática de dependências vulneráveis.
# Dependabot abre PRs semanais consolidando upgrades de npm e GitHub Actions.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      radix-ui:
        patterns: ["@radix-ui/*"]
      tanstack:
        patterns: ["@tanstack/*"]
      tiptap:
        patterns: ["@tiptap/*"]
    labels: ["dependencies"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
